<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .panel { fill: #ffffff; stroke: #0b1f4d; stroke-width: 2; }
      .muted { fill: #e9eef8; stroke: #8ea0c5; stroke-width: 1.5; }
      .title { font: 700 32px Arial, Helvetica, sans-serif; fill: #0b1f4d; }
      .subtitle { font: 400 18px Arial, Helvetica, sans-serif; fill: #4b5563; }
      .heading { font: 700 22px Arial, Helvetica, sans-serif; fill: #0b1f4d; }
      .label { font: 700 16px Arial, Helvetica, sans-serif; fill: #0b1f4d; }
      .line { stroke: #8f6a3a; stroke-width: 4; fill: none; }
    </style>
  </defs>
  <rect width="100%" height="100%" class="bg"/>
  <text x="60" y="64" class="title">Use Case Diagram</text>
  <text x="60" y="100" class="subtitle">Main actions available to Customer and Admin inside the platform</text>
  <circle cx="170" cy="320" r="58" class="panel"/>
  <text x="135" y="328" class="heading">Customer</text>
  <circle cx="1030" cy="320" r="58" class="panel"/>
  <text x="1010" y="328" class="heading">Admin</text>
  <rect x="360" y="120" width="250" height="80" rx="18" class="muted"/><text x="430" y="168" class="label">Browse Products</text>
  <rect x="360" y="230" width="250" height="80" rx="18" class="muted"/><text x="430" y="278" class="label">Manage Wishlist</text>
  <rect x="360" y="340" width="250" height="80" rx="18" class="muted"/><text x="445" y="388" class="label">Place Orders</text>
  <rect x="360" y="450" width="250" height="80" rx="18" class="muted"/><text x="420" y="498" class="label">Track Order Status</text>
  <rect x="690" y="120" width="250" height="80" rx="18" class="muted"/><text x="760" y="168" class="label">Manage Products</text>
  <rect x="690" y="230" width="250" height="80" rx="18" class="muted"/><text x="770" y="278" class="label">Manage Coupons</text>
  <rect x="690" y="340" width="250" height="80" rx="18" class="muted"/><text x="770" y="388" class="label">Update Orders</text>
  <rect x="690" y="450" width="250" height="80" rx="18" class="muted"/><text x="780" y="498" class="label">View Analytics</text>
  <line x1="228" y1="300" x2="360" y2="160" class="line"/>
  <line x1="228" y1="315" x2="360" y2="270" class="line"/>
  <line x1="228" y1="330" x2="360" y2="380" class="line"/>
  <line x1="228" y1="345" x2="360" y2="490" class="line"/>
  <line x1="972" y1="300" x2="940" y2="160" class="line"/>
  <line x1="972" y1="315" x2="940" y2="270" class="line"/>
  <line x1="972" y1="330" x2="940" y2="380" class="line"/>
  <line x1="972" y1="345" x2="940" y2="490" class="line"/>
</svg>
