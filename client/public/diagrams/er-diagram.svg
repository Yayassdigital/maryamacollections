<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .panel { fill: #ffffff; stroke: #0b1f4d; stroke-width: 2; }
      .accent { fill: #0b1f4d; stroke: #0b1f4d; stroke-width: 2; }
      .title { font: 700 32px Arial, Helvetica, sans-serif; fill: #0b1f4d; }
      .subtitle { font: 400 18px Arial, Helvetica, sans-serif; fill: #4b5563; }
      .heading { font: 700 22px Arial, Helvetica, sans-serif; fill: #0b1f4d; }
      .text { font: 400 16px Arial, Helvetica, sans-serif; fill: #111827; }
      .white { font: 700 18px Arial, Helvetica, sans-serif; fill: #ffffff; }
      .line { stroke: #8f6a3a; stroke-width: 4; fill: none; }
    </style>
  </defs>
  <rect width="100%" height="100%" class="bg"/>
  <text x="60" y="64" class="title">ER Diagram</text>
  <text x="60" y="100" class="subtitle">Core database entities and how they relate to each other</text>
  <rect x="110" y="160" width="220" height="180" rx="22" class="panel"/>
  <text x="190" y="200" class="heading">User</text>
  <text x="140" y="235" class="text">_id</text>
  <text x="140" y="260" class="text">name, email, password</text>
  <text x="140" y="285" class="text">role, phone</text>
  <text x="140" y="310" class="text">savedAddresses, wishlist</text>
  <rect x="480" y="120" width="250" height="250" rx="22" class="accent"/>
  <text x="575" y="165" class="white">Product</text>
  <text x="515" y="205" class="white">name, slug, category</text>
  <text x="515" y="235" class="white">price, discount, badge</text>
  <text x="515" y="265" class="white">images, stock, featured</text>
  <text x="515" y="295" class="white">variants, reviews, rating</text>
  <rect x="870" y="160" width="220" height="170" rx="22" class="panel"/>
  <text x="950" y="200" class="heading">Coupon</text>
  <text x="905" y="235" class="text">code, type, value</text>
  <text x="905" y="260" class="text">minimumOrder, isActive</text>
  <text x="905" y="285" class="text">expiresAt</text>
  <rect x="430" y="470" width="350" height="180" rx="22" class="panel"/>
  <text x="560" y="510" class="heading">Order</text>
  <text x="470" y="545" class="text">user → User</text>
  <text x="470" y="570" class="text">orderItems[] → Product reference</text>
  <text x="470" y="595" class="text">shippingAddress, paymentMethod</text>
  <text x="470" y="620" class="text">status, couponCode, totals</text>
  <path d="M330 250 L480 250" class="line"/>
  <path d="M730 240 L870 240" class="line"/>
  <path d="M610 370 L610 470" class="line"/>
  <path d="M250 340 C250 460, 400 460, 430 540" class="line"/>
  <path d="M980 330 C980 440, 820 440, 780 540" class="line"/>
</svg>
